# conda env create | update -f environment.yaml
name: looptrace
channels:
    - conda-forge
    - defaults
    - numba
dependencies:
    - pandas
    - python == 3.10
    - numba
    - llvmlite
    - scipy
    - numpy
    - pandas
    - dask
    - joblib
    - nb_conda
    - pip
    - pip:
        - tensorrt
        - tensorflow == 2.11.1
        - scikit-image
        - pyyaml
        - zarr
          # for deconvolution
        - flowdec
        - fsspec >= 0.9.0
        - imagecodecs
        - napari
        - numcodecs
        - tqdm
        - cellpose
        - nd2
