#COM ports for pump and stage:
pump_port: COM3
stage_port: COM6

#Pump settings:
bartels_freq: 130
bartels_voltage: 120
CPP_speed: 500

#Well plate setup:
well_plate:
    bottom_right:
      x: 108
      y: 72
    top_left:
      x: 0
      y: 0
    columns: 12
    rows: 8
    first_probe: A1
    last_probe: A3
    well_spacing: 9
    z_base: -39

#Positions outside of well plate
positions:
    SSC_DAPI:
      x: 20
      y: 102
      z: -39
    strip:
      x: 20
      y: 118
      z: -39
    wash:
      x: 20
      y: 137
      z: -39

#The sequence to follow. Possible actions and parameters are probe: wp or position listed above, pump: time for pumping, pause: time for pause, image: 1.
sequence:
    - probe: wp
    - pause: 2
    - pump: 60
    - pause: 60
    - probe: wash
    - pause: 2
    - pump: 120
    - pause: 1
    - probe: SSC_DAPI
    - pause: 1
    - pump: 60
    - pause: 30
    - image: 1
    - probe: strip
    - pause: 1
    - pump: 60
    - pause: 60
    - probe: wash
    - pause: 1
    - pump: 20