# conda env create | update -f environment.yaml
name: looptrace
channels:
    - conda-forge
    - defaults
    - numba
dependencies:
    - pandas
    - python == 3.10.11
    - numba
    - llvmlite
    - scipy
    - numpy
    - pandas
    - dask
    - joblib
    - pip
    - pip:
        - tensorrt
          # for CUDA-based container, we ned to install tensorflow.
        - tensorflow == 2.11.1
        - scikit-image
        - pyyaml
        - zarr
          # for deconvolution
        - flowdec
        - fsspec >= 0.9.0
        - imagecodecs
          # for spot detection and its preview
        - napari[all]
        - numcodecs
        - tqdm
        - cellpose
        - nd2
